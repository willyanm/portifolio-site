<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Singularity - Fluid Hero</title>
  <style>
    /* Reset e Configurações Base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background-color: #000;
      font-family: system-ui, -apple-system, sans-serif;
      color: #fff;
    }

    /* Cores de Seleção */
    ::selection { background-color: #a855f7; color: #fff; }

    /* Camada 0: Container do WebGL */
    #canvas-container {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
    }
    #canvas-container canvas { display: block; }

    /* Camada 1: Efeitos Visuais (Grid e Vinheta) */
    .grid-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0.2;
      background-size: 50px 50px;
      background-image: 
        linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
    }
    
    .vignette {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 10;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.6) 100%);
    }

    /* Camada 2: Interface de Usuário (UI) */
    .ui-layer {
      position: relative;
      z-index: 20;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 100%;
      height: 100%;
      padding: 2rem 4rem;
      pointer-events: none; /* Deixa o mouse passar para o canvas */
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: auto; /* Reativa o clique nos botões */
    }
    .brand span {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #d8b4fe;
      margin-bottom: 0.25rem;
    }
    .brand h2 {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      text-transform: uppercase;
    }
    .menu-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      padding: 0.5rem 1.5rem;
      font-size: 0.625rem;
      font-family: monospace;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.3s;
    }
    .menu-btn:hover { background: rgba(255, 255, 255, 0.1); }

    /* Hero Principal */
    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      max-width: 56rem;
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.25rem 0.75rem;
      border: 1px solid rgba(168, 85, 247, 0.3);
      background: rgba(88, 28, 135, 0.1);
      backdrop-filter: blur(8px);
      margin-bottom: 1.5rem;
    }
    .status-badge .dot-container { position: relative; display: flex; width: 8px; height: 8px; }
    .status-badge .dot {
      position: relative; display: inline-flex; border-radius: 50%; width: 8px; height: 8px; background-color: #a855f7;
    }
    .status-badge .dot-ping {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%; background-color: #c084fc; opacity: 0.75; animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
    }
    @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
    .status-badge span.text { font-size: 0.625rem; font-family: monospace; text-transform: uppercase; letter-spacing: 0.1em; color: #e9d5ff; }

    .hero-title {
      font-size: clamp(3.75rem, 8vw, 8rem);
      font-weight: 500;
      letter-spacing: -0.05em;
      line-height: 0.9;
      mix-blend-mode: overlay;
    }
    .hero-title .gradient-text {
      background: linear-gradient(to right, #e9d5ff, transparent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .divider { height: 1px; width: 8rem; background: rgba(255, 255, 255, 0.3); margin: 2rem 0; }

    .hero-desc {
      max-width: 28rem;
      font-size: clamp(0.875rem, 2vw, 1.125rem);
      color: #9ca3af;
      line-height: 1.6;
      font-weight: 300;
    }

    .actions {
      margin-top: 3rem;
      display: flex;
      gap: 1.5rem;
      pointer-events: auto; /* Reativa o clique nos botões */
    }
    .btn-primary {
      background: #fff; color: #000; border: none; padding: 1rem 2rem; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: background 0.3s;
    }
    .btn-primary:hover { background: #d8b4fe; }
    .btn-secondary {
      background: transparent; color: #fff; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.3); padding-bottom: 0.25rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: border-color 0.3s;
    }
    .btn-secondary:hover { border-color: #fff; }

    /* Footer Data */
    .footer-data {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 0.625rem;
      font-family: monospace;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .footer-data .stats { display: flex; flex-direction: column; gap: 0.5rem; }

    @media (max-width: 768px) {
      .ui-layer { padding: 1.5rem; }
      .actions { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- Camada 0: WebGL -->
  <div id="canvas-container"></div>

  <!-- Camada 1: Efeitos Visuais -->
  <div class="grid-overlay"></div>
  <div class="vignette"></div>

  <!-- Camada 2: Interface -->
  <main class="ui-layer">
    
    <header>
      <div class="brand">
        <span>SYSTEM_01</span>
        <h2>Nexus</h2>
      </div>
      <button class="menu-btn">[ Menu ]</button>
    </header>

    <div class="hero-content">
      <div class="status-badge">
        <div class="dot-container">
          <span class="dot-ping"></span>
          <span class="dot"></span>
        </div>
        <span class="text">Neural Net: Online</span>
      </div>

      <h1 class="hero-title">
        DIGITAL<br />
        <span class="gradient-text">SINGULARITY</span>
      </h1>

      <div class="divider"></div>

      <p class="hero-desc">
        We are charting the unknown regions of the digital void. Leave a trail of light in the darkness.
      </p>

      <div class="actions">
        <button class="btn-primary">Initialize</button>
        <button class="btn-secondary">Read Manifesto</button>
      </div>
    </div>

    <div class="footer-data">
      <div class="stats">
        <span>CPU: 12%</span>
        <span>MEM: 404MB</span>
      </div>
      <div>
        // v2.0.4 -- Deployment Ready
      </div>
    </div>

  </main>

  <!-- Script da Simulação WebGL usando OGL (Importado via ES Modules) -->
  <script type="module">
    import { Renderer, Program, Mesh, Triangle, Vec2, RenderTarget, Color } from 'https://cdn.skypack.dev/ogl';

    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById('canvas-container');

      // Configurações da simulação
      const baseColor = [0.0, 0.0, 0.05]; // Void Black/Blue
      const glowColor = [0.6, 0.2, 1.0];  // Singularity Violet
      const dissipation = 0.985;

      // 1. Setup Renderer
      const renderer = new Renderer({
        alpha: false,
        dpr: Math.min(window.devicePixelRatio, 2)
      });
      const gl = renderer.gl;

      // Habilita texturas de ponto flutuante (Crucial para cores HDR no shader)
      gl.getExtension('OES_texture_float');
      gl.getExtension('OES_texture_float_linear');

      // --------------------------------------------------------
      // SHADER: SIMULATION (Física do fluido)
      // --------------------------------------------------------
      const simFragment = /* glsl */ `
        precision highp float;
        
        uniform sampler2D uTexture;
        uniform float uTime;
        uniform vec2 uMouse;
        uniform float uMouseActive;
        uniform vec2 uResolution;
        uniform float uAspect;
        uniform float uDissipation;
        uniform vec3 uBaseColor;
        uniform vec3 uGlowColor;
        
        varying vec2 vUv;

        // --- CURL NOISE (Turbulência) ---
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

        float snoise(vec2 v) {
          const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
          vec2 i  = floor(v + dot(v, C.yy) );
          vec2 x0 = v -   i + dot(i, C.xx);
          vec2 i1;
          i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
          vec4 x12 = x0.xyxy + C.xxzz;
          x12.xy -= i1;
          i = mod289(i);
          vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
          vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
          m = m*m ;
          m = m*m ;
          vec3 x = 2.0 * fract(p * C.www) - 1.0;
          vec3 h = abs(x) - 0.5;
          vec3 ox = floor(x + 0.5);
          vec3 a0 = x - ox;
          m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
          vec3 g;
          g.x  = a0.x  * x0.x  + h.x  * x0.y;
          g.yz = a0.yz * x12.xz + h.yz * x12.yw;
          return 130.0 * dot(m, g);
        }

        vec2 curl(vec2 p) {
          float eps = 0.001;
          float n1, n2, a, b;
          n1 = snoise(p + vec2(0, eps));
          n2 = snoise(p - vec2(0, eps));
          a = (n1 - n2) / (2.0 * eps);
          n1 = snoise(p + vec2(eps, 0));
          n2 = snoise(p - vec2(eps, 0));
          b = (n1 - n2) / (2.0 * eps);
          return vec2(a, -b);
        }

        void main() {
          vec2 uv = vUv;
          
          vec2 flow = curl(uv * 2.0 + uTime * 0.05);
          vec2 newUv = uv - flow * 0.003; 
          
          // Leve "Zoom Out" para criar um efeito de vazio nas bordas
          newUv -= 0.5;
          newUv *= 0.995; 
          newUv += 0.5;
          
          vec4 advected = texture2D(uTexture, newUv);
          
          // Injeção de rastro pelo Mouse
          vec2 mouse = uMouse;
          mouse.x *= uAspect;
          vec2 curUv = uv;
          curUv.x *= uAspect;
          
          float dist = length(curUv - mouse);
          float brush = smoothstep(0.05, 0.0, dist) * uMouseActive;
          
          vec3 injectColor = mix(uGlowColor, vec3(1.0), 0.5) * brush * 3.0;
          
          vec3 finalColor = advected.rgb + injectColor;
          finalColor *= uDissipation;

          gl_FragColor = vec4(finalColor, 1.0);
        }
      `;

      // --------------------------------------------------------
      // SHADER: DISPLAY (Color Grading visual na tela final)
      // --------------------------------------------------------
      const displayFragment = /* glsl */ `
        precision highp float;
        uniform sampler2D uTexture;
        varying vec2 vUv;
        uniform vec3 uBaseColor;

        void main() {
          vec4 color = texture2D(uTexture, vUv);
          vec3 c = color.rgb;
          
          c += uBaseColor * 0.2;
          c = pow(c, vec3(1.4)); 
          
          // Dithering para evitar "banding" (linhas duras) no gradiente escuro
          float noise = fract(sin(dot(vUv, vec2(12.9898, 78.233))) * 43758.5453);
          c += noise * 0.02;

          gl_FragColor = vec4(c, 1.0);
        }
      `;

      const geometry = new Triangle(gl);

      const simProgram = new Program(gl, {
        vertex: `attribute vec2 uv; attribute vec2 position; varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 0, 1); }`,
        fragment: simFragment,
        uniforms: {
          uTexture: { value: null },
          uTime: { value: 0 },
          uMouse: { value: new Vec2(0, 0) },
          uMouseActive: { value: 0 },
          uResolution: { value: new Vec2(0, 0) },
          uAspect: { value: 1 },
          uDissipation: { value: dissipation },
          uBaseColor: { value: new Color(baseColor[0], baseColor[1], baseColor[2]) },
          uGlowColor: { value: new Color(glowColor[0], glowColor[1], glowColor[2]) },
        },
      });

      const displayProgram = new Program(gl, {
        vertex: `attribute vec2 uv; attribute vec2 position; varying vec2 vUv; void main() { vUv = uv; gl_Position = vec4(position, 0, 1); }`,
        fragment: displayFragment,
        uniforms: {
          uTexture: { value: null },
          uBaseColor: { value: new Color(baseColor[0], baseColor[1], baseColor[2]) },
        },
      });

      const simMesh = new Mesh(gl, { geometry, program: simProgram });
      const displayMesh = new Mesh(gl, { geometry, program: displayProgram });

      // Framebuffer Objects (Para o rastro persistente na tela)
      const fboArgs = {
        width: window.innerWidth >> 1, // Metade da resolução p/ performance e visual esfumaçado
        height: window.innerHeight >> 1,
        type: gl.HALF_FLOAT || gl.FLOAT,
        internalFormat: gl.RGBA16F || gl.RGBA,
        minFilter: gl.LINEAR,
        magFilter: gl.LINEAR,
      };
      
      let fboRead = new RenderTarget(gl, fboArgs);
      let fboWrite = new RenderTarget(gl, fboArgs);

      const mouse = new Vec2(0, 0);
      const targetMouse = new Vec2(0, 0);
      let isMoving = 0;

      function resize() {
        const w = container.offsetWidth;
        const h = container.offsetHeight;
        renderer.setSize(w, h);

        const fboW = w >> 1;
        const fboH = h >> 1;
        fboRead.setSize(fboW, fboH);
        fboWrite.setSize(fboW, fboH);

        simProgram.uniforms.uResolution.value.set(w, h);
        simProgram.uniforms.uAspect.value = w / h;
      }
      window.addEventListener('resize', resize);
      resize();

      function updateMouse(x, y) {
        targetMouse.set(x / gl.canvas.width, 1.0 - y / gl.canvas.height);
        isMoving = 1.0;
      }

      window.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
      window.addEventListener('touchmove', e => updateMouse(e.touches[0].clientX, e.touches[0].clientY));

      // Loop de Animação
      function update(t) {
        requestAnimationFrame(update);
        const time = t * 0.001;

        mouse.lerp(targetMouse, 0.15);

        if (Math.abs(mouse.x - targetMouse.x) < 0.001) {
          isMoving *= 0.9;
        }

        simProgram.uniforms.uTime.value = time;
        simProgram.uniforms.uMouse.value.copy(mouse);
        simProgram.uniforms.uMouseActive.value = isMoving;
        simProgram.uniforms.uTexture.value = fboRead.texture;

        // Render Ping-Pong
        renderer.render({ scene: simMesh, target: fboWrite });
        displayProgram.uniforms.uTexture.value = fboWrite.texture;
        renderer.render({ scene: displayMesh });

        // Troca os buffers
        const temp = fboRead;
        fboRead = fboWrite;
        fboWrite = temp;
      }
      
      requestAnimationFrame(update);
      container.appendChild(gl.canvas);
    });
  </script>
</body>
</html>
